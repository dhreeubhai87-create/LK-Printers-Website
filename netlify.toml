# Netlify Configuration for React / TanStack Start (Vite)
# Reference: https://tanstack.com/start/latest/docs/framework/react/deploy/netlify

[build]
  # We set NITRO_PRESET=netlify so Nitro (Vinxi) builds the serverless functions & public assets for Netlify
  command = "NITRO_PRESET=netlify npm run build"
  
  # The output directory for static assets generated by Vinxi / Nitro
  publish = ".output/public"

# Failsafe Redirects for Single Page Application (SPA) / client-side routing.
# This ensures that deep links (e.g., /account/orders, /product/some-slug) route correctly 
# even if Netlify tries to load them directly from the static directory.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  # Forces Node version compatibility for the Netlify build environment
  NODE_VERSION = "20"
  
  # Optimization flags
  GENERATE_SOURCEMAP = "false"
